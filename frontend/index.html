<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TON Tap Game</title>

  <link rel="stylesheet" href="style.css" />

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <script type="module" src="app.js"></script>
</head>
<body>

<div class="top">
  <h1>TON TAP GAME</h1>
</div>

<div class="balance-box">
  <h2 id="coins">0</h2>
  <p>Coins</p>
</div>

<div class="energy-box">
  <div id="energy">1000</div>
</div>

<div class="tap-area">
  <button id="tapBtn">TAP</button>
</div>

<div class="menu">
  <button id="dailyBtn">Daily Reward</button>
  <button id="taskBtn">Tasks</button>
  <button id="walletBtn">Connect Wallet</button>
</div>

</body>
</html>
